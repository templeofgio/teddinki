<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" href="/teddinki/icon/favicon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/teddinki/icon/favicon.png">
    <link rel="apple-touch-icon" href="/teddinki/icon/favicon.png">
    <link rel="mask-icon" color="#5bbad5" href="/teddinki/icon/favicon.png">
    <meta charset="UTF-8">
    

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Соцсети | Выбор региона</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f9fafc 0%, #f1f4f9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            transition: background-color 0.2s;
        }

        
        .card {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            box-shadow: 
                0 20px 40px -12px rgba(0, 10, 30, 0.15),
                0 8px 24px -6px rgba(0, 0, 0, 0.05),
                inset 0 1px 2px rgba(255, 255, 255, 0.8);
            padding: 2.5rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

      
        .title {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(125deg, #1a2639, #2c3e5c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1.5rem;
            line-height: 1.2;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .title i {
            background: #eef2f6;
            padding: 0.6rem;
            border-radius: 50%;
            font-size: 1.5rem;
            color: #2c3e5c;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
        }

        
        .sub {
            font-size: 1.1rem;
            font-weight: 400;
            color: #4a5568;
            margin-bottom: 2.5rem;
            background: rgba(230, 242, 255, 0.4);
            padding: 0.8rem 1.4rem;
            border-radius: 60px;
            display: inline-block;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.6);
        }

        
        .question-box {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 44px;
            padding: 1.8rem 2rem;
            margin-bottom: 2.5rem;
            border: 1px solid rgba(255,255,255,0.9);
            box-shadow: 0 8px 20px -10px rgba(0,20,40,0.1);
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .region-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }

        .region-btn {
            flex: 1 1 180px;
            padding: 1rem 0.8rem;
            border: none;
            background: white;
            border-radius: 100px;
            font-size: 1.2rem;
            font-weight: 500;
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02), 0 2px 4px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .region-btn i {
            font-size: 1.3rem;
            opacity: 0.7;
            transition: transform 0.2s;
        }

        .region-btn:hover {
            background: #f0f4fe;
            border-color: #bdd3ff;
            box-shadow: 0 12px 20px -14px #2b6fbb;
            transform: translateY(-2px);
        }

        .region-btn:active {
            transform: translateY(2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
        }

        
        .region-btn.active {
            background: #e6f0ff;
            border: 1px solid #7ca5ff;
            box-shadow: 0 6px 14px -8px #2266cc;
            color: #103d7a;
        }

        
        .links-section {
            margin-top: 1.8rem;
            transition: opacity 0.25s ease, transform 0.2s;
        }

        .links-header {
            font-size: 1.1rem;
            font-weight: 500;
            color: #3f4a5e;
            margin-bottom: 1.2rem;
            letter-spacing: 0.2px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid rgba(156, 180, 215, 0.3);
            padding-bottom: 0.8rem;
        }

        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 1.8rem;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 120px;
            text-decoration: none;
            color: #1e293b;
            font-weight: 500;
            font-size: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02), 0 2px 2px rgba(0,0,0,0.02);
            transition: all 0.25s;
            border-left: 4px solid transparent;
        }

        .social-btn i {
            font-size: 1.8rem;
            width: 2rem;
            text-align: center;
            transition: transform 0.2s;
        }

        .social-btn span {
            flex: 1;
            margin-left: 1.2rem;
        }

        .social-btn .arrow {
            font-size: 1.2rem;
            opacity: 0.4;
            transition: opacity 0.2s, transform 0.2s;
        }

        
        .social-btn:hover {
            background: white;
            box-shadow: 0 20px 30px -14px rgba(38, 77, 128, 0.25);
            border-left-width: 6px;
            transform: scale(1.02) translateY(-2px);
        }

        .social-btn:hover .arrow {
            opacity: 0.9;
            transform: translateX(6px);
        }

        .social-btn:hover i {
            transform: scale(1.1);
        }

        
        .social-btn.vk {
            border-left-color: #0077ff;
        }
        .social-btn.vk i {
            color: #0077ff;
        }

        .social-btn.instagram {
            border-left-color: #c32aa3;
        }
        .social-btn.instagram i {
            color: #c32aa3;
        }

        .social-btn.tedsby {
            border-left-color: #1e7b85; /* Tedsby — тёплый тон */
        }
        .social-btn.tedsby i {
            color: #1e7b85;
        }

        .social-btn.facebook {
            border-left-color: #1877f2;
        }
        .social-btn.facebook i {
            color: #1877f2;
        }

        /* Скрытый класс */
        .hidden {
            display: none !important;
        }

       
        @media (max-width: 480px) {
            .card { padding: 1.8rem 1.2rem; }
            .title { font-size: 1.8rem; }
            .region-buttons { flex-direction: column; }
            .region-btn { justify-content: center; }
            .social-btn { padding: 1rem 1.4rem; }
        }

      
        .footer-note {
            margin-top: 2.8rem;
            font-size: 0.85rem;
            color: #8a9bb5;
            text-align: center;
            border-top: 1px dashed rgba(128, 145, 175, 0.3);
            padding-top: 1.4rem;
        }
    </style>
</head>
<body>

<div class="card" id="appCard">

   
    <div class="title">
        <i class="fa-regular fa-compass"></i> 
        <span>Мои соцсети</span>
    </div>
    <div class="sub">
        <i class="fa-solid fa-at"></i>
        <span>teddinki by Inna Ulyanova</span>
    </div>

   
    <div class="question-box">
        <div class="question-text">
            <i class="fa-regular fa-flag"></i> 
            Из какой вы страны? 
        </div>
        <div class="region-buttons">
            <button class="region-btn" id="btnRussia">
                <i class="fa-regular fa-flag"></i> Россия
            </button>
            <button class="region-btn" id="btnWorld">
                <i class="fa-regular fa-globe"></i> Другая страна
            </button>
        </div>
    </div>

    
    <div id="russiaLinks" class="links-section hidden">
        <div class="links-header">
            <i class="fa-regular fa-star" style="color: #1f4b8a;"></i> 
            Ресурсы для России
        </div>
        <div class="links-grid">

           
            <a href="https://vk.ru/teddinki" class="social-btn vk" target="_blank" rel="noopener">
                <i class="fa-brands fa-vk"></i>
                <span>ВКонтакте</span>
                <i class="fa-solid fa-chevron-right arrow"></i>
            </a>
            
            <a href="https://www.instagram.com/teddinki?igsh=YmtkNGw3cndpMGY4&utm_source=qr" class="social-btn instagram" target="_blank" rel="noopener">
                <i class="fa-brands fa-instagram"></i>
                <span>Instagram</span>
                <i class="fa-solid fa-chevron-right arrow"></i>
            </a>
           
            <a href="https://teddinki.tedsby.com/" class="social-btn tedsby" target="_blank" rel="noopener">
                <i>🧸</i>
                <span>Tedsby</span>
                <i class="fa-solid fa-chevron-right arrow"></i>
            </a>
        </div>
        <div style="margin-top: 1rem; font-size: 0.9rem; color: #51759e; background: #ecf3fc; padding: 0.4rem 1rem; border-radius: 40px; display: inline-block;">
            <i class="fa-regular fa-circle-check"></i> Локальное сообщество
        </div>
    </div>

   
    <div id="worldLinks" class="links-section hidden">
        <div class="links-header">
            <i class="fa-regular fa-compass" style="color: #1f6d4a;"></i> 
            Международные соцсети
        </div>
        <div class="links-grid">

          
            <a href="https://www.facebook.com/share/1BfDG11x75/?mibextid=wwXIfr" class="social-btn facebook" target="_blank" rel="noopener">
                <i class="fa-brands fa-facebook"></i>
                <span>Facebook</span>
                <i class="fa-solid fa-chevron-right arrow"></i>
            </a>
           
            <a href="https://www.instagram.com/teddinki?igsh=YmtkNGw3cndpMGY4&utm_source=qr" class="social-btn instagram" target="_blank" rel="noopener">
                <i class="fa-brands fa-instagram"></i>
                <span>Instagram</span>
                <i class="fa-solid fa-chevron-right arrow"></i>
            </a>
          
            <a href="https://teddinki.tedsby.com/" class="social-btn tedsby" target="_blank" rel="noopener">
                <i>🧸</i>
                <span>Tedsby</span>
                <i class="fa-solid fa-chevron-right arrow"></i>
            </a>
        </div>
        <div style="margin-top: 1rem; font-size: 0.9rem; color: #32643b; background: #e5f5e6; padding: 0.4rem 1rem; border-radius: 40px; display: inline-block;">
            <i class="fa-regular fa-globe"></i> Доступно везде
        </div>
    </div>

    
    <div class="footer-note">
        <i class="fa-regular fa-heart" style="margin-right: 5px;"></i> 
        нажми на кнопку региона, чтобы увидеть нужные соцсети
    </div>
</div>


<script>
    (function() {
        // Получаем элементы
        const btnRussia = document.getElementById('btnRussia');
        const btnWorld = document.getElementById('btnWorld');
        const russiaLinks = document.getElementById('russiaLinks');
        const worldLinks = document.getElementById('worldLinks');

        
        function resetActiveButtons() {
            btnRussia.classList.remove('active');
            btnWorld.classList.remove('active');
        }

        
        function showRussia() {
            resetActiveButtons();
            btnRussia.classList.add('active');

        
            russiaLinks.classList.remove('hidden');
            worldLinks.classList.add('hidden');
        }

        
        function showWorld() {
            resetActiveButtons();
            btnWorld.classList.add('active');

            worldLinks.classList.remove('hidden');
            russiaLinks.classList.add('hidden');
        }

       
        btnRussia.addEventListener('click', showRussia);
        btnWorld.addEventListener('click', showWorld);

        
        const allSocialLinks = document.querySelectorAll('.social-btn');
        allSocialLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                if (link.getAttribute('href') === '#') {
                    e.preventDefault();
                    alert('[пример ссылки] сюда можно вставить реальный URL — ' + link.querySelector('span')?.innerText);
                }
            });
        });

        console.log('готово — выбери страну');
    })();
</script>


</body>
</html>
